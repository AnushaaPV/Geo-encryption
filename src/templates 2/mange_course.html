
{% extends 'adminindex.html' %}
{% block body %}

<body>
<form id="form1" name="form1" method="post" action="/addcourse#about">
<table class="table table-hover">
    <tr>
      <th >DEPARTMENT</th>
      <th >COURSE</th>
      <td >&nbsp;</td>
    </tr>
    {% for i in data %}
    <tr>
      <td>&nbsp;{{i['department_name']}}</td>
      <td>&nbsp;{{i['coursename']}}</td>
        <td><a href="editcourse?id={{i['courseid']}}#about">Edit</a>
        <a href="/deletecourse?id={{i['courseid']}}">Delete</a> </td>
    </tr>
    {% endfor %}
  </table>
  <input type="submit" name="Submit" value="ADD Course" />
</form>
</body>
{% endblock %}
