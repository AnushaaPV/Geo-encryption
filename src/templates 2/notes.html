<body>
<form action="searchnotes#about" method="post">
<table id="customers">
  <tr>
    <td>Subject
      <select name="select">
        {% for i in data %}
         <option value ="{{i[0]}}" {% if i[0]|string== sub %} selected {% endif %}>{{i[1]}}</option>
      {% endfor %}
      </select>
      <input type="submit" name="Submit" value="Search" /></td>
  </tr>

  <tr>
    <td>Notes</td>
  </tr>
  {% for i in val %}
  <tr>
   <td><a href="static/notes/{{i[2]}}">{{i[2]}}</a> </td>
  </tr>
  {% endfor %}

</table>
</form>
</body>
