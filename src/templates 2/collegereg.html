<body>
<p>&nbsp;</p>
<form id="form1" name="form1" method="post" action="/collegereg1">
  <p>&nbsp;</p>
  <table id="customers">
    <tr>
      <td width="176">&nbsp;</td>
      <td width="281">COLLEGE REGISTRATION </td>
    </tr>
    <tr>
      <td>COLLEGE NAME </td>
      <td><input type="text" name="textfield"   required pattern="[A-Z a-z.]{3,25}"/></td>
    </tr>
    <tr>
      <td>PLACE</td>
      <td><input type="text" name="textfield2" required pattern="[A-Z a-z.]{3,25}"/></td>
    </tr>
    <tr>
      <td>LATITUDE</td>
      <td><input type="text" name="textfield3" required /></td>
    </tr>
    <tr>
      <td>LONGITUDE</td>
      <td><input type="text" name="textfield4" required /></td>
    </tr>
    <tr>
      <td>ADDRESS</td>
      <td><textarea name="textarea" pattern="[A-Z a-z.]{3,100}"></textarea></td>
    </tr>
    <tr>
      <td>PHONE</td>
      <td><input type="text" name="textfield5" required pattern="[6789][0-9]{9}" /></td>
    </tr>
    <tr>
      <td>USERNAME</td>
      <td><input type="text" name="textfield6" /></td>
    </tr>
    <tr>
      <td>PASSWORD</td>
      <td><input type="PASSWORD" name="textfield7" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" required /></td>
    </tr>
    <tr>
      <td>&nbsp;</td>
      <td><input type="submit" name="Submit" value="Register" /></td>
    </tr>
  </table>
  <p>&nbsp;</p>
</form>
<p>&nbsp;</p>
</body>
