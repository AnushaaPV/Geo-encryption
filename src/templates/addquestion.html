<!--<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">-->
<!--<html xmlns="http://www.w3.org/1999/xhtml">-->
{% extends 'companyindex.html' %}
{% block body %}
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Untitled Document</title>
</head>

<body>
<form id="form1" name="form1" method="post" action="addquestion">
  <table width="200" border="1" id="customers">
    <tr>
      <th scope="col">Test</th>
      <td scope="col"><label>
   <select name="select">
      {% for i in val %}
      <option value="{{i['tid']}}">{{i['type']}}</option>
      {% endfor %}
      </select>
      </label></td>
    </tr>
    <tr>
      <th scope="row">Question</th>
      <td><label>
        <input type="text" name="textfield" required pattern="[A-Z a-z.]{3,25}"/>
      </label></td>
    </tr>
    <tr>
      <th scope="row">Option1</th>
      <td><label>
        <input type="text" name="textfield2"required pattern="[A-Z a-z.]{3,25}"/>
      </label></td>
    </tr>
    <tr>
      <th scope="row">Option2</th>
      <td><label>
        <input type="text" name="textfield3"required pattern="[A-Z a-z.]{3,25}"/>
      </label></td>
    </tr>
    <tr>
      <th scope="row">Option3</th>
      <td><label>
        <input type="text" name="textfield4"required pattern="[A-Z a-z.]{3,25}"/>
      </label></td>
    </tr>
    <tr>
      <th scope="row">Option4</th>
      <td><label>
        <input type="text" name="textfield5"required pattern="[A-Z a-z.]{3,25}"/>
      </label></td>
    </tr>
    <tr>
      <th scope="row">Answer</th>
      <td><label>
        <input type="text" name="textfield6" required pattern="[A-Z a-z.]{3,25}"/>
      </label></td>
    </tr>
    <tr>
      <td colspan="2" scope="row"><label>
        <input type="submit" name="Submit" value="ADD" />
      </label></td>
    </tr>
  </table>
</form>
</body>
</html>
{% endblock %}
