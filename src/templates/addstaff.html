<body>
<p>&nbsp;</p>
<form id="form1" name="form1" method="post" action="/insertstaff">
 <table id="customers">
    <tr>
      <td>NAME</td>
      <td><input type="text" name="textfield" required pattern="[A-Z a-z.]{3,25}" /></td>
    </tr>
    <tr>
      <td>GENDER</td>
      <td><input name="radiobutton" type="radio" value="Male" />
        MALE
        <input name="radiobutton" type="radio" value="Female" />
        FEMALE</td>
    </tr>
    <tr>
      <td>DOB</td>
      <td><input type="date" name="textfield2" min="1950-01-01" max="2015-12-31" required  /></td>
    </tr>
    <tr>
      <td>PLACE</td>
      <td><input type="text" name="textfield3" pattern="[A-Z a-z.]{3,25}"/></td>
    </tr>
    <tr>
      <td>POST</td>
      <td><input type="text" name="textfield4" pattern="[A-Z a-z.]{3,25}"/></td>
    </tr>
    <tr>
      <td>PIN</td>
      <td><input type="text" name="textfield5" required pattern="[0-9]{6}" /></td>
    </tr>
    <tr>
      <td>PHONENO</td>
      <td><input type="text" name="textfield6" required pattern="[6789][0-9]{9}"/></td>
    </tr>
    <tr>
      <td>EMAIL</td>
      <td><input type="text" name="textfield7" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,3}"/></td>
    </tr>
    <tr>
      <td>QUALIFICATION</td>
      <td><input type="checkbox" name="checkbox" value="Degree" />
        Degree 
        <input type="checkbox" name="checkbox" value="PG" />
        PG</td>
    </tr>
    <tr>
      <td>USERNAME</td>
      <td><input type="text" name="textfield8" /></td>
    </tr>
    <tr>
      <td>PASSWORD</td>
      <td><input type="password" name="textfield9" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" required /></td>
    </tr>
    <tr>
      <td>&nbsp;</td>
      <td><input type="submit" name="Submit" value="ADD" /></td>
    </tr>
  </table>
  <p>&nbsp;</p>
  <p>&nbsp;</p>
</form>
<p>&nbsp;</p>
</body>
