
{% extends 'adminindex.html' %}
{% block body %}
<body>
<form action="/insertsubjects" method="post">
<table class="table table-hover">

  <tr>
    <td>COURSE</td>
    <td><select name="select2">
      {% for i in data %}
      <option value="{{i['courseid']}}">{{i['coursename']}}</option>
      {% endfor %}
    </select>
    </td>
  </tr>
  <tr>
    <td>SUBJECT</td>
    <td><input type="text" name="textfield" required pattern="[A-Z a-z.]{3,25}" /></td>
  </tr>
  <tr>
    <td>&nbsp;</td>
    <td><input type="submit" name="Submit" value="ADD" /></td>
  </tr>
</table>
</form>
</body>
{% endblock %}
