{% extends 'adminindex.html' %}
{% block body %}
<body>
<form action="/insertcourse" method="post">
<table class="table table-hover">
  <tr>
    <td>DEPARTMENT</td>
    <td>
      <select name="select">
        {% for i in data %}
        <option value="{{i['department_id']}}">{{i['department_name']}}</option>
        {% endfor %}
      </select>
    </td>
  </tr>
  <tr>
    <td>COURSE</td>
    <td>
        <input type="text" name="textfield" required pattern="[A-Z a-z.]{3,25}"/>
        </td>
  </tr>
  <tr>
    <td>
     </td>
    <td><input type="submit" name="Submit" value="ADD" /></td>
  </tr>
</table>
</form>
</body>
{% endblock %}
